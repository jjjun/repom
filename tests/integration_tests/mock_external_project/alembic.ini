# Mock external project - Alembic configuration
# This simulates mine-py/alembic.ini

[alembic]
# Uses repom's env.py while remaining portable across checkouts.
script_location = %(here)s/../../../alembic

# IMPORTANT: version_locations must be set in alembic.ini
# env.py's context.configure(version_locations=...) only affects migration execution,
# NOT file creation by `alembic revision` command
version_locations = %(here)s/alembic/versions

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
